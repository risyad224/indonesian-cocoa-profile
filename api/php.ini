[PHP]
; Vercel/Serverless PHP Configuration

; Temporary directory configuration for serverless
upload_tmp_dir = /tmp
sys_temp_dir = /tmp
session.save_path = /tmp

; Disable functions that might cause issues on serverless
disable_functions = pcntl_fork,pcntl_signal

; Memory and time limits
memory_limit = 512M
max_execution_time = 30
max_input_time = 30

; File uploads
post_max_size = 100M
upload_max_filesize = 100M

; Error reporting - production
display_errors = Off
log_errors = On
error_log = /tmp/php_errors.log

; Session settings
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Date
date.timezone = Asia/Jakarta

; Other
expose_php = Off
short_open_tag = On
